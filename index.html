<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Automation – Sign Up</title>
    <style>
      :root {
        --bg: #0a0f1f;
        --panel: rgba(14, 24, 46, 0.86);
        --text: #e9f0ff;
        --muted: #9cb0d5;
        --accent: #5b8cff;
        --accent-2: #30d5c8;
        --border: rgba(140, 167, 227, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% 20%, #22376f 0%, transparent 36%),
          radial-gradient(circle at 85% 10%, #00a7a0 0%, transparent 34%),
          linear-gradient(135deg, #040815 0%, #0a0f1f 46%, #131c3a 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 460px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
        line-height: 1.25;
      }

      .sub {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 0.97rem;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        font-size: 0.92rem;
      }

      input {
        width: 100%;
        padding: 12px 13px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(8, 14, 29, 0.82);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.25);
      }

      button {
        margin-top: 8px;
        border: 0;
        border-radius: 12px;
        padding: 13px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 9px 20px rgba(48, 213, 200, 0.23);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.8;
        transform: none;
      }

      .status {
        min-height: 22px;
        margin-top: 8px;
        font-size: 0.93rem;
      }

      .status.success {
        color: #7bf8c0;
      }

      .status.error {
        color: #ff8e9f;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Start your AI Automation Journey</h1>
      <p class="sub">Melde dich an und sichere dir dein Premium Onboarding.</p>

      <form id="signupForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Max Mustermann" required />
        </div>

        <div>
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" placeholder="name@company.com" required />
        </div>

        <div>
          <label for="phone">Telefonnummer</label>
          <input id="phone" name="phone" type="tel" placeholder="+49 151 12345678" required />
        </div>

        <button id="submitButton" type="submit">Jetzt anmelden</button>
        <p id="statusMessage" class="status" aria-live="polite"></p>
      </form>
    </section>

    <script>
      const form = document.getElementById("signupForm");
      const button = document.getElementById("submitButton");
      const statusMessage = document.getElementById("statusMessage");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const customerName = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();

        const payload = {
          customerName,
          email,
          phone,
          package: "Premium",
          signupDate: new Date().toISOString().slice(0, 10),
          source: "website",
        };

        button.disabled = true;
        statusMessage.className = "status";
        statusMessage.textContent = "Wird gesendet...";

        try {
          const response = await fetch("http://localhost:5678/webhook-test/Customer onboarding - sign-up form", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error(`Webhook antwortet mit Status ${response.status}`);
          }

          form.reset();
          statusMessage.className = "status success";
          statusMessage.textContent = "Danke! Deine Anmeldung wurde erfolgreich übermittelt.";
        } catch (error) {
          statusMessage.className = "status error";
          statusMessage.textContent =
            "Senden fehlgeschlagen. Bitte prüfe, ob n8n läuft, und versuche es erneut.";
          console.error(error);
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
