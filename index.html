<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Automation – Sign Up</title>
    <style>
      :root {
        --bg: #080d1c;
        --panel: rgba(17, 27, 52, 0.86);
        --text: #ecf2ff;
        --muted: #a8b7d6;
        --accent: #5d8dff;
        --accent-2: #2ed8cb;
        --border: rgba(144, 169, 225, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 12% 20%, #1d3166 0%, transparent 38%),
          radial-gradient(circle at 88% 12%, #009f94 0%, transparent 34%),
          linear-gradient(140deg, #050916 0%, #0b1228 45%, #172245 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      .sub {
        margin: 0 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      .row {
        display: grid;
        gap: 14px;
        grid-template-columns: 1fr 1fr;
      }

      @media (max-width: 560px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        font-size: 0.92rem;
      }

      input,
      select {
        width: 100%;
        padding: 12px 13px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(8, 14, 29, 0.82);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(93, 141, 255, 0.28);
      }

      button {
        margin-top: 8px;
        border: 0;
        border-radius: 12px;
        padding: 13px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.8;
      }

      .status {
        min-height: 22px;
        margin-top: 6px;
        font-size: 0.93rem;
      }

      .status.success {
        color: #7bf8c0;
      }

      .status.error {
        color: #ff8e9f;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Sign-Up für dein AI Onboarding</h1>
      <p class="sub">Starte mit einem Premium Setup für dein automatisiertes Wachstum.</p>

      <form id="signupForm">
        <div class="row">
          <div>
            <label for="firstName">Vorname</label>
            <input id="firstName" name="firstName" type="text" placeholder="Sarah" required />
          </div>
          <div>
            <label for="lastName">Nachname</label>
            <input id="lastName" name="lastName" type="text" placeholder="Johnson" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="birthDate">Geburtsdatum</label>
            <input id="birthDate" name="birthDate" type="date" required />
          </div>
          <div>
            <label for="maritalStatus">Marital status</label>
            <select id="maritalStatus" name="maritalStatus" required>
              <option value="" selected disabled>Bitte auswählen</option>
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Divorced">Divorced</option>
              <option value="Widowed">Widowed</option>
            </select>
          </div>
        </div>

        <div>
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" placeholder="sarahjohnson@gmail.com" required />
        </div>

        <div>
          <label for="phone">Telefonnummer</label>
          <input id="phone" name="phone" type="tel" placeholder="+49-173-713-4963" required />
        </div>

        <button id="submitButton" type="submit">Jetzt anmelden</button>
        <p id="statusMessage" class="status" aria-live="polite"></p>
      </form>
    </section>

    <script>
      const form = document.getElementById("signupForm");
      const button = document.getElementById("submitButton");
      const statusMessage = document.getElementById("statusMessage");
      const webhookUrl = "http://localhost:5678/webhook-test/Customer%20onboarding%20-%20sign-up%20form";

      function formatBirthDate(dateValue) {
        const [year, month, day] = dateValue.split("-");
        return `${day}.${month}.${year}`;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          "customer First Name": document.getElementById("firstName").value.trim(),
          "customer last Name": document.getElementById("lastName").value.trim(),
          "birth date": formatBirthDate(document.getElementById("birthDate").value),
          "marital status": document.getElementById("maritalStatus").value,
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          package: "Premium",
          signupDate: new Date().toISOString().slice(0, 10),
          source: "website"
        };

        button.disabled = true;
        statusMessage.className = "status";
        statusMessage.textContent = "Wird gesendet...";

        try {
          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`Webhook antwortet mit Status ${response.status}`);
          }

          form.reset();
          statusMessage.className = "status success";
          statusMessage.textContent = "Danke! Anmeldung erfolgreich gesendet.";
        } catch (error) {
          statusMessage.className = "status error";
          statusMessage.textContent = "Senden fehlgeschlagen. Bitte prüfe, ob n8n läuft.";
          console.error(error);
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
